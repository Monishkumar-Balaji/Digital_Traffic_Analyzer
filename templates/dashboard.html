</div>

<script>
async function fetchData() {
    try {
        const res = await fetch("/data");
        const data = await res.json();

        // ALERTS
        let alertHTML = "";
        data.alerts.forEach(a => {
            alertHTML += `<div class="alert">⚠ ${a[1]}</div>`;
        });
        document.getElementById("alerts").innerHTML = alertHTML;

        // LOGS
        let logHTML = "";
        data.logs.forEach(l => {
            logHTML += `<tr>
                <td>${l[1]}</td>
                <td>${l[2]}</td>
                <td>${l[3]}</td>
            </tr>`;
        });
        document.getElementById("logs").innerHTML = logHTML;

        // GRAPH
        const ipCounts = {};
        data.logs.forEach(l => {
            ipCounts[l[1]] = (ipCounts[l[1]] || 0) + 1;
        });

        const labels = Object.keys(ipCounts);
        const values = Object.values(ipCounts);

        const ctx = document.getElementById('ipChart').getContext('2d');

        if (window.chart) {
            window.chart.destroy();
        }

        window.chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Requests per IP',
                    data: values
                }]
            }
        });

    } catch (err) {
        console.error("Error fetching data:", err);
    }
}

// initial + auto refresh
fetchData();
setInterval(fetchData, 3000);
</script>

</body>
